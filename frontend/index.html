<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenVisionGuard — AI Surveillance OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(148, 163, 184, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --critical: #ef4444;
            --high: #f97316;
            --medium: #eab308;
            --low: #22c55e;
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(239, 68, 68, 0.1), transparent 25%);
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: -0.025em;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
            background: rgba(15, 23, 42, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            border: 1px solid var(--border-color);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--low);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--low);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1.5rem;
            padding: 1.5rem;
            flex: 1;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: var(--glass-blur);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Video Area */
        .video-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 500px;
            overflow: hidden;
        }

        #video-feed {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            /* pointer-events: none; */
        }

        #overlay-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        .bbox {
            position: absolute;
            border: 2px solid transparent;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .bbox:hover {
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 2rem;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* Alerts Area */
        .alerts-feed {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .alerts-feed::-webkit-scrollbar {
            width: 6px;
        }
        .alerts-feed::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        .alert-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            animation: slideIn 0.3s ease-out;
            border-left: 4px solid var(--accent);
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .alert-card.critical { border-left-color: var(--critical); }
        .alert-card.high { border-left-color: var(--high); }
        .alert-card.medium { border-left-color: var(--medium); }
        .alert-card.low { border-left-color: var(--low); }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* Controls Panel */
        .controls {
            padding: 1rem;
            display: flex;
            gap: 1rem;
        }

        .input-group {
            flex: 1;
            display: flex;
            gap: 0.5rem;
        }

        input {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        /* Person Intelligence Profile HUD */
        .profile-hud {
            position: absolute;
            top: 1rem;
            left: 1rem;
            width: 320px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.25rem;
            display: none;
            z-index: 50;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }

        .hud-close {
            cursor: pointer;
            color: var(--text-dim);
        }

        .hud-close:hover { color: white; }

        .hud-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .hud-stat {
            background: rgba(0,0,0,0.3);
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .hud-stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .hud-stat-val {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .timeline {
            margin-top: 1rem;
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 0.75rem;
        }

        .timeline-item {
            display: flex;
            gap: 0.75rem;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }
        
        .timeline-time { color: var(--text-dim); }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            OpenVisionGuard Dashboard
        </div>
        <div class="system-status">
            <div class="status-dot"></div>
            System Online
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header">
                Live AI Feed
                <span style="font-size: 0.8rem; color: var(--text-dim);" id="fps-counter">0 FPS</span>
            </div>
            <div class="video-container" id="video-container">
                <div class="empty-state" id="empty-state">
                    <h4>No Active Stream</h4>
                    <p style="font-size: 0.85rem; margin-top: 0.5rem;">Enter a source to start AI processing.</p>
                </div>
                <img id="video-feed" alt="Live AI Feed">
                <div id="overlay-layer"></div>

                <!-- Intelligence Profile HUD -->
                <div class="profile-hud" id="profile-hud">
                    <div class="hud-header">
                        <h3 id="hud-title" style="font-size: 1.1rem; margin:0;">Profile</h3>
                        <svg class="hud-close" onclick="closeProfile()" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </div>
                    <div class="hud-grid">
                        <div class="hud-stat">
                            <div class="hud-stat-label">Identity ID</div>
                            <div class="hud-stat-val" id="hud-id" style="font-size: 0.85rem; word-break: break-all;">-</div>
                        </div>
                        <div class="hud-stat">
                            <div class="hud-stat-label">Risk Level</div>
                            <div class="hud-stat-val" id="hud-risk" style="text-transform: capitalize;">-</div>
                        </div>
                        <div class="hud-stat">
                            <div class="hud-stat-label">Activity</div>
                            <div class="hud-stat-val" id="hud-activity" style="text-transform: capitalize;">-</div>
                        </div>
                        <div class="hud-stat">
                            <div class="hud-stat-label">First Seen</div>
                            <div class="hud-stat-val" id="hud-first-seen" style="font-size: 0.8rem;">-</div>
                        </div>
                    </div>
                    <h4 style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.5rem;">Event Timeline</h4>
                    <div class="timeline" id="hud-timeline">
                        <!-- timeline items injected here -->
                    </div>
                </div>

            </div>
            <div class="controls">
                <div class="input-group">
                    <input type="text" id="source-input" value="d:/firsttask_pon/OpenVisionGuard/test4video.mp4">
                    <button class="btn" id="start-btn" onclick="startStream()">Start AI Stream</button>
                    <button class="btn" id="stop-btn" onclick="stopStream()" style="background: var(--border-color); display: none;">Stop</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                System Alerts
                <div style="font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 999px; background: rgba(255,255,255,0.1);" id="alert-counter">
                    0 Active
                </div>
            </div>
            <div class="alerts-feed" id="alerts-container">
            </div>
        </div>
    </main>

    <script>
        const videoFeed = document.getElementById('video-feed');
        const overlayLayer = document.getElementById('overlay-layer');
        const emptyState = document.getElementById('empty-state');
        const profileHud = document.getElementById('profile-hud');
        let activeStreams = [];
        let framesCount = 0;
        
        setInterval(() => {
            document.getElementById('fps-counter').innerText = `${framesCount} FPS`;
            framesCount = 0;
        }, 1000);

        async function startStream() {
            const src = document.getElementById('source-input').value;
            await fetch('/stream/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({source: src, camera_id: 'CAM_01'})
            });
            emptyState.style.display = 'none';
            videoFeed.style.display = 'block';
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'inline-flex';
            
            const ws = new WebSocket(`ws://${location.host}/ws/stream/CAM_01`);
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                videoFeed.src = 'data:image/jpeg;base64,' + data.frame;
                framesCount++;
                drawOverlays(data.width, data.height, data.detections);
            };
            activeStreams.push(ws);
            
            // Connect alerts
            const aws = new WebSocket(`ws://${location.host}/ws/alerts`);
            aws.onmessage = (e) => {
                const a = JSON.parse(e.data);
                const aDiv = document.createElement('div');
                aDiv.className = `alert-card ${a.severity}`;
                aDiv.innerHTML = `<div class="alert-header"><b>${a.type}</b> <span>${new Date().toLocaleTimeString()}</span></div><div style="font-size: 0.9em">${a.message}</div>`;
                document.getElementById('alerts-container').prepend(aDiv);
            };
            activeStreams.push(aws);
        }

        async function stopStream() {
            await fetch('/stream/stop/CAM_01', { method: 'POST' });
            activeStreams.forEach(ws => ws.close());
            emptyState.style.display = 'block';
            videoFeed.style.display = 'none';
            overlayLayer.innerHTML = '';
            closeProfile();
        }

        function drawOverlays(nativeW, nativeH, detections) {
            overlayLayer.innerHTML = '';
            if(!detections || detections.length === 0) return;

            const rect = videoFeed.getBoundingClientRect();
            // Calculate actual rendered img dimensions due to object-fit: contain
            const imgRatio = nativeW / nativeH;
            const containerRatio = rect.width / rect.height;
            
            let renderW, renderH, offX = 0, offY = 0;
            if (imgRatio > containerRatio) {
                renderW = rect.width;
                renderH = rect.width / imgRatio;
                offY = (rect.height - renderH) / 2;
            } else {
                renderH = rect.height;
                renderW = rect.height * imgRatio;
                offX = (rect.width - renderW) / 2;
            }

            const scaleX = renderW / nativeW;
            const scaleY = renderH / nativeH;

            for (const d of detections) {
                const box = document.createElement('div');
                box.className = 'bbox';
                const x1 = offX + (d.bbox[0] * scaleX);
                const y1 = offY + (d.bbox[1] * scaleY);
                const w = (d.bbox[2] - d.bbox[0]) * scaleX;
                const h = (d.bbox[3] - d.bbox[1]) * scaleY;
                
                box.style.left = `${x1}px`;
                box.style.top = `${y1}px`;
                box.style.width = `${w}px`;
                box.style.height = `${h}px`;
                box.title = "Click to analyze: " + d.global_id;
                
                // Add click event for Intelligence Profile
                box.onclick = () => fetchProfile(d.global_id);
                overlayLayer.appendChild(box);
            }
        }

        async function fetchProfile(globalId) {
            try {
                const res = await fetch(`/identities/${globalId}`);
                if(!res.ok) return;
                const data = await res.json();
                
                document.getElementById('hud-id').innerText = data.global_id.substring(0,12) + '...';
                document.getElementById('hud-title').innerText = data.metadata.face_name || "Unknown Individual";
                
                const risk = document.getElementById('hud-risk');
                risk.innerText = data.metadata.risk_level || 'low';
                risk.style.color = data.metadata.risk_level === 'critical' ? 'var(--critical)' : 'var(--text-main)';
                
                document.getElementById('hud-activity').innerText = data.metadata.activity || 'unknown';
                document.getElementById('hud-first-seen').innerText = new Date(data.history[0]?.timestamp || Date.now()).toLocaleTimeString();
                
                const timeline = document.getElementById('hud-timeline');
                timeline.innerHTML = '';
                if(data.history && data.history.length > 0) {
                    data.history.forEach(ev => {
                        timeline.innerHTML += `
                            <div class="timeline-item">
                                <span class="timeline-time">${new Date(ev.timestamp).toLocaleTimeString()}</span>
                                <span>${ev.activity || 'Detected'} at ${ev.camera_id}</span>
                            </div>
                        `;
                    });
                } else {
                    timeline.innerHTML = '<div style="font-size:0.8rem; color:var(--text-dim);">No history yet</div>';
                }

                profileHud.style.display = 'block';
            } catch(err) {
                console.error("Error fetching profile", err);
            }
        }

        function closeProfile() {
            profileHud.style.display = 'none';
        }
    </script>
</body>
</html>
